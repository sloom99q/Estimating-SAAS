# Local Postgres + Minio for the API (Phase 9 Sprint 1).
#
# Sprint 1 does NOT depend on Docker — `apps/api/.env.example` documents the
# Neon path as the primary zero-install option. This file is shipped as the
# documented fallback when you want a fully local stack with no external
# services.
#
# Usage:
#   docker compose up -d
#   export DATABASE_URL="postgresql://estimator:estimator@localhost:5432/estimator"
#   cd apps/api && bunx prisma migrate deploy && bun src/seed.ts && bun src/index.ts

services:
  postgres:
    image: postgres:16-alpine
    container_name: estimator-postgres
    environment:
      POSTGRES_USER: estimator
      POSTGRES_PASSWORD: estimator
      POSTGRES_DB: estimator
    ports:
      - "5432:5432"
    volumes:
      - estimator-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimator -d estimator"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Object storage for blob uploads (Sprint 2+ will start writing to it).
  # S3-compatible API on :9000; web console on :9001 (admin / minioadmin).
  minio:
    image: minio/minio:latest
    container_name: estimator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - estimator-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  estimator-postgres:
  estimator-minio:
